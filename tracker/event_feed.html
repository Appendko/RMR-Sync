<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RMR Sync — Event Feed</title>
<style>
  body { font-family: sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; background: #111; color: #eee; }
  #controls { margin-bottom: 1rem; display: flex; gap: 1rem; align-items: center; }
  #log { display: flex; flex-direction: column; gap: 0.4rem; }
  .entry { display: flex; flex-wrap: wrap; align-items: center; gap: 0.4rem; background: #222; padding: 0.4rem 0.6rem; border-radius: 4px; }
  .entry .player { font-weight: bold; margin-right: 0.4rem; }
  .entry img { width: 24px; height: 24px; flex-shrink: 0; image-rendering: pixelated; }
  .entry .icon-sprite {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    background-image: url("assets/item_icon_sheet.png");
    background-repeat: no-repeat;
    background-size: 192px 1344px;
    image-rendering: pixelated;
  }
  .entry .item-label { font-size: 0.85rem; color: #ccc; margin-left: 0.2rem; }
  .entry.status-line { color: #999; font-size: 0.85rem; font-style: italic; }
</style>
</head>
<body>
<div id="controls">
  <label><input type="checkbox" id="showText" /> Show item names</label>
</div>
<div id="log"></div>
<script src="item_id_map.js"></script>
<script src="icon_map.js"></script>
<script src="event_feed.js"></script>
</body>
</html>
