<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RMR Sync — Event Feed</title>
<style>
  body { font-family: sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; background: #111; color: #eee; }
  #log { display: flex; flex-direction: column; gap: 0.4rem; }
  .entry { display: flex; flex-wrap: wrap; align-items: center; gap: 0.4rem; background: #222; padding: 0.4rem 0.6rem; border-radius: 4px; line-height: 24px; }
  .entry .player { font-size: 1rem; font-weight: bold; margin-right: 0.4rem; }
  .entry .item { display: flex; align-items: center; gap: 0.2rem; }
  .entry img { width: 24px; height: 24px; flex-shrink: 0; image-rendering: pixelated; }
  .entry .icon-sprite {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    background-image: url("assets/item_icon_sheet.png");
    background-repeat: no-repeat;
    background-size: 192px 1344px;
    image-rendering: pixelated;
  }
  .entry .item-label { font-size: 1rem; color: #ccc; }
  /* Stage-clear/boss-defeat/game-clear events are milestones, not routine
     pickups -- heavy weight + a brighter warm tint sets them apart without
     needing an "[Event]" text prefix. */
  .entry .check-item .item-label { font-weight: 800; color: #ffd76b; }
  .entry .misc-event-item { font-style: italic; color: #bcbcbc; }
  .entry.status-line { color: #999; font-size: 0.85rem; font-style: italic; }

  #settingsHotspot {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1000;
  }
  #settingsGear {
    display: block;
    padding: 6px 10px;
    font-size: 16px;
    color: #888;
    opacity: 0.3;
    user-select: none;
  }
  #settingsHotspot:hover #settingsGear {
    opacity: 1;
  }
  #settingsPanel {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    flex-direction: column;
    gap: 0.5rem;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 0 6px 6px 0;
    padding: 0.75rem;
    min-width: 260px;
    font-size: 0.85rem;
  }
  #settingsHotspot:hover #settingsPanel {
    display: flex;
  }
  #settingsPanel label {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }
  #settingsPanel label.checkbox-label {
    flex-direction: row;
    align-items: center;
    gap: 0.4rem;
  }
  #settingsPanel input[type="text"],
  #settingsPanel input[type="number"],
  #settingsPanel select {
    background: #222;
    border: 1px solid #444;
    color: #eee;
    padding: 0.3rem;
    border-radius: 3px;
    font-size: 0.85rem;
  }
  #settingsPanel button {
    background: #333;
    border: 1px solid #555;
    color: #eee;
    padding: 0.4rem;
    border-radius: 3px;
    cursor: pointer;
  }
  #settingsPanel button:hover {
    background: #444;
  }
</style>
</head>
<body>
<div id="settingsHotspot">
  <span id="settingsGear">⚙</span>
  <div id="settingsPanel">
    <label>Room key
      <input type="text" id="settingsRoom" autocomplete="off" />
    </label>
    <label>Worker URL
      <input type="text" id="settingsWorkerUrl" autocomplete="off" />
    </label>
    <label>Max lines (blank = unlimited)
      <input type="number" id="settingsMaxLines" min="1" />
    </label>
    <label class="checkbox-label">
      <input type="checkbox" id="settingsShowText" />
      Show item names
    </label>
    <label class="checkbox-label">
      <input type="checkbox" id="settingsShowItems" />
      Show item pickups
    </label>
    <label class="checkbox-label">
      <input type="checkbox" id="settingsShowChecks" />
      Show events (stage clears, boss defeats)
    </label>
    <label>Item name language
      <select id="settingsLang">
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh-TW">繁體中文</option>
      </select>
    </label>
    <label>Overlay scale (%)
      <input type="number" id="settingsScale" min="50" max="300" step="10" />
    </label>
    <button id="settingsApply" type="button">Apply &amp; reload</button>
  </div>
</div>
<div id="log"></div>
<script src="item_id_map.js"></script>
<script src="item_names_en.js"></script>
<script src="item_names_ja.js"></script>
<script src="item_names_zhtw.js"></script>
<script src="icon_map.js"></script>
<script src="check_id_map.js"></script>
<script src="check_names_en.js"></script>
<script src="check_names_ja.js"></script>
<script src="check_names_zhtw.js"></script>
<script src="misc_event_names_en.js"></script>
<script src="misc_event_names_ja.js"></script>
<script src="misc_event_names_zhtw.js"></script>
<script src="check_lookup.js"></script>
<script src="event_feed.js"></script>
</body>
</html>
