<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RMR Sync — Room Admin</title>
<style>
  body { font-family: sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
  label { display: block; margin-top: 1rem; font-weight: bold; }
  input, select { width: 100%; padding: 0.5rem; font-size: 1rem; box-sizing: border-box; }
  button { margin-top: 1rem; margin-right: 0.5rem; padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
  #status { margin-top: 1.5rem; white-space: pre-wrap; background: #f0f0f0; padding: 1rem; border-radius: 4px; }
  .error { color: #b00020; }
</style>
</head>
<body>
<h1>RMR Sync — Room Admin</h1>

<label for="workerUrl">Worker URL</label>
<input id="workerUrl" placeholder="https://rmr-sync.yourname.workers.dev" />

<label for="roomKey">Room key (Option string from spoiler.txt)</label>
<input id="roomKey" placeholder="V204#X7#SV8d5m27k+p99XcvrXsSiYA#..." />

<label for="adminSecret">Admin secret (yours alone — do not share, do not show on stream)</label>
<input id="adminSecret" type="password" placeholder="choose a private password for this room" />

<label for="mode">Share mode (used when creating or resetting the room)</label>
<select id="mode">
  <option value="checksSeen">Seen</option>
  <option value="checksSeen+shared">Seen + Common Items</option>
  <option value="checksSeen+items">Seen + All Items</option>
</select>

<button id="createBtn">Create Room</button>
<button id="resetBtn">Reset Room</button>
<button id="refreshBtn">Refresh Status</button>
<button id="deleteBtn">Delete Room</button>

<div id="status">No status yet.</div>

<script src="room_key.js"></script>
<script>
// Display-only -- the wire mode strings themselves are unchanged (see
// worker/src/validation.js's VALID_MODES / pages/tracker/event_feed.js's own
// identical MODE_LABELS). A regular host has no reason to read boot.lua to
// know what "checksSeen+shared" means.
const MODE_LABELS = {
  checksSeen: "Seen",
  "checksSeen+shared": "Seen + Common Items",
  "checksSeen+items": "Seen + All Items",
};
function friendlyModeLabel(mode) {
  return mode ? (MODE_LABELS[mode] ?? mode) : "(not created yet)";
}

// Remembers the last-used Worker URL, room key, and mode across visits --
// everything except the admin secret, which is deliberately never persisted
// (it's a password; leaving it out of localStorage means it's never sitting
// around in plaintext, at the cost of re-typing it each visit).
const WORKER_URL_STORAGE_KEY = "rmrAdminWorkerUrl";
const ROOM_KEY_STORAGE_KEY = "rmrAdminRoomKey";
const MODE_STORAGE_KEY = "rmrAdminMode";

function restoreSettings() {
  try {
    const workerUrl = localStorage.getItem(WORKER_URL_STORAGE_KEY);
    const roomKey = localStorage.getItem(ROOM_KEY_STORAGE_KEY);
    const mode = localStorage.getItem(MODE_STORAGE_KEY);
    if (workerUrl) document.getElementById("workerUrl").value = workerUrl;
    if (roomKey) document.getElementById("roomKey").value = roomKey;
    if (mode) document.getElementById("mode").value = mode;
  } catch {
    // localStorage unavailable (e.g. private browsing) -- just start blank.
  }
}

function persistSetting(key, value) {
  try {
    localStorage.setItem(key, value);
  } catch {
    // Not fatal -- this session just won't be remembered next time.
  }
}

function setupSettingsPersistence() {
  restoreSettings();
  document.getElementById("workerUrl").addEventListener("input", (e) => persistSetting(WORKER_URL_STORAGE_KEY, e.target.value));
  document.getElementById("roomKey").addEventListener("input", (e) => persistSetting(ROOM_KEY_STORAGE_KEY, e.target.value));
  document.getElementById("mode").addEventListener("change", (e) => persistSetting(MODE_STORAGE_KEY, e.target.value));
}

function getBaseUrl() {
  return document.getElementById("workerUrl").value.trim().replace(/\/$/, "");
}

function getRoomUrl(path) {
  const base = getBaseUrl();
  const room = encodeURIComponent(extractSeedKey(document.getElementById("roomKey").value.trim()));
  return `${base}/room/${room}${path}`;
}

function showStatus(text, isError) {
  const el = document.getElementById("status");
  el.textContent = text;
  el.className = isError ? "error" : "";
}

async function createRoom() {
  try {
    const res = await fetch(getRoomUrl("/admin/init"), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        mode: document.getElementById("mode").value,
        adminSecret: document.getElementById("adminSecret").value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    showStatus(`Room mode: ${friendlyModeLabel(data.mode)}${data.created ? " (just created)" : " (already existed)"}`, false);
  } catch (err) {
    showStatus(`Create failed: ${err.message}`, true);
  }
}

async function resetRoom() {
  try {
    const res = await fetch(getRoomUrl("/admin/reset"), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        adminSecret: document.getElementById("adminSecret").value,
        mode: document.getElementById("mode").value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    showStatus(`Room reset. Mode: ${friendlyModeLabel(data.mode)}`, false);
  } catch (err) {
    showStatus(`Reset failed: ${err.message}`, true);
  }
}

async function deleteRoom() {
  if (!confirm("Delete this room? This cannot be undone.")) return;
  try {
    const res = await fetch(getRoomUrl("/admin/delete"), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ adminSecret: document.getElementById("adminSecret").value }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    showStatus("Room deleted.", false);
  } catch (err) {
    showStatus(`Delete failed: ${err.message}`, true);
  }
}

async function refreshStatus() {
  try {
    const res = await fetch(getRoomUrl("/admin/status"));
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    if (data.mode) {
      document.getElementById("mode").value = data.mode;
      // Setting .value programmatically doesn't fire a "change" event, so
      // the input listener in setupSettingsPersistence won't catch this --
      // persist it explicitly, so a refreshed mode is remembered too.
      persistSetting(MODE_STORAGE_KEY, data.mode);
    }
    const itemsLine = (data.mode === "checksSeen+shared" || data.mode === "checksSeen+items")
      ? `merged item bits set: ${data.mergedItemsBitsSet}\n`
      : "";
    showStatus(
      `mode: ${friendlyModeLabel(data.mode)}\n` +
      `checksSeen bits set: ${data.checksSeenBitsSet}\n` +
      itemsLine +
      `event count: ${data.eventCount}\n` +
      `connected trackers: ${data.connected}`,
      false
    );
  } catch (err) {
    showStatus(`Status check failed: ${err.message}`, true);
  }
}

document.getElementById("createBtn").addEventListener("click", createRoom);
document.getElementById("resetBtn").addEventListener("click", resetRoom);
document.getElementById("refreshBtn").addEventListener("click", refreshStatus);
document.getElementById("deleteBtn").addEventListener("click", deleteRoom);

setupSettingsPersistence();
</script>
</body>
</html>
